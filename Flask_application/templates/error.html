<!DOCTYPE html?
<html lang="en">
    <head>
        <meta charset = "UTF-8">
        <meta http equiv = "X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
        <title>Sign UpForm</title>
    </head>
    <body>
        <p>Hi welcome to the sign up page</p>
        <p>Today is a {{ day_of_the_week }}</p>
        <p>The time is {{ current_time }}</p>
        <p class="error">Sorry the data could not be submitted</p>

        <div class="centered">
            <form action="/submit" method="POST">
                <label for="name">Name</label>
                <input type="text" name="name", id="name" placeholder="Enter your name">
                <br>

                <label for="email">Email</label>
                <input type="text" name="email", id="email" placeholder="Enter your email">
                <br>

                <label for="password">Password</label>
                <input type="password" name="password", id="password" placeholder="Enter your password">
                <br>

                <label for="confirm_password">Confirm Password</label>
                <input type="password" name="confirm_password", id="confirm_password" placeholder="Enter your confirm password">
                <br>

                <input type="submit", value="Submit">
            </form>
            
            <form action = "/view">
                <button>View MongoDB Data</button>
            </form>

            <form action = "/api">
                <button>View data from file</button>
            </form>
        </div>
    </body>

</html>
